name: Test Standalone Output

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install

      - run: pnpm build
      
      - run: pnpm test